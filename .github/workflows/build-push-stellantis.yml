name: Build & Push (Stellantis)

on:
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'automatic update of')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Stellantis
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud (Stellantis)
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Stellantis registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push to Stellantis
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: europe-west1-docker.pkg.dev/stellantis-490509/brain-mcp-tavily/tavily-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
